<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>National MSME Dashboard — Government Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div id="welcome"></div>
      <div class="stats-grid" id="stats"></div>
      <div class="card">
        <div class="card-header"><h3>Registered MSME Portfolio — National Registry</h3></div>
        <div id="msmes"><div class="loading-pulse"></div></div>
      </div>
    </main>
  </div>
  <script src="/app/js/terminology.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (user.organization_type !== 'government') redirectByRole(user);
    FHS.mountLayout('govt', 'dashboard');

    document.getElementById('page-header').innerHTML = FHS.renderPageHeader({
      title: 'National MSME Dashboard',
      subtitle: 'Ministry of MSME · National registry & scheme intelligence',
    });
    document.getElementById('welcome').innerHTML = FHS.renderWelcomeBanner('govt');

    api('/api/v1/govt/dashboard').then(data => {
      document.getElementById('stats').innerHTML = [
        FHS.renderStatCard('Registered MSMEs', data.registered_msmes, { icon: 'users' }),
        FHS.renderStatCard('Scheme Applications', data.scheme_applications, { icon: 'schemes' }),
        FHS.renderStatCard('Portfolio Avg. FHS', data.avg_portfolio_score ?? '—', { icon: 'score', variant: 'success' }),
      ].join('');

      const msmes = data.msmes || [];
      document.getElementById('msmes').innerHTML = msmes.length ? `
        <div class="table-wrap"><table>
          <thead><tr><th>Enterprise</th><th>Sector</th><th>FHS</th><th>Credit Grade</th><th></th></tr></thead>
          <tbody>${msmes.map(m => `<tr>
            <td><strong>${m.business_name}</strong><br><small style="color:var(--muted)">${m.msme_id}</small></td>
            <td>${m.sector || '—'}</td>
            <td>${m.latest_score != null ? `<span class="score-cell">${m.latest_score.toFixed(1)}</span>` : '—'}</td>
            <td>${m.latest_grade ? `<span class="${FHS.gradeClass(m.latest_grade)}">${m.latest_grade}</span>` : '—'}</td>
            <td><a class="btn btn-sm btn-accent" href="/app/govt/schemes.html?msme=${m.msme_id}">Scheme Advisory</a></td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<div class="empty-state"><p>No MSMEs registered in the national registry.</p></div>';
    }).catch(e => alert(e.message));
  </script>
</body>
</html>
