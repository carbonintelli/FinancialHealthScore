<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Government Dashboard — Financial Health Score</title>
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" style="display:flex;flex-direction:column;min-height:100vh;background:linear-gradient(180deg,#1a5f2a,#0d3d1a)">
      <div class="brand">MSME Intelligence</div>
      <div class="sub">Government Portal</div>
      <nav>
        <a href="/app/govt/dashboard.html" class="active">Dashboard</a>
        <a href="/app/govt/schemes.html">Scheme Advisory</a>
      </nav>
      <div class="user-block"><button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="logout()">Sign Out</button></div>
    </aside>
    <main class="main">
      <h1 class="page-title">Government MSME Dashboard</h1>
      <div class="stats-grid" id="stats"></div>
      <div class="card">
        <h3>Registered MSME Portfolio (National View)</h3>
        <div id="msmes">Loading…</div>
      </div>
    </main>
  </div>
  <script src="/app/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (user.organization_type !== 'government') redirectByRole(user);

    api('/api/v1/govt/dashboard').then(data => {
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="label">Registered MSMEs</div><div class="value">${data.registered_msmes}</div></div>
        <div class="stat-card"><div class="label">Scheme Applications</div><div class="value">${data.scheme_applications}</div></div>
        <div class="stat-card"><div class="label">Avg Portfolio Score</div><div class="value">${data.avg_portfolio_score ?? '—'}</div></div>
      `;
      const msmes = data.msmes || [];
      document.getElementById('msmes').innerHTML = msmes.length ? `
        <table><thead><tr><th>Business</th><th>Sector</th><th>Score</th><th>Grade</th><th></th></tr></thead>
        <tbody>${msmes.map(m => `<tr>
          <td>${m.business_name}<br><small>${m.msme_id}</small></td>
          <td>${m.sector || '—'}</td>
          <td>${m.latest_score?.toFixed?.(1) ?? '—'}</td>
          <td>${m.latest_grade || '—'}</td>
          <td><a class="btn btn-sm btn-accent" href="/app/govt/schemes.html?msme=${m.msme_id}">AI Scheme Advisory</a></td>
        </tr>`).join('')}</tbody></table>` : '<p>No MSMEs registered.</p>';
    }).catch(e => alert(e.message));
  </script>
</body>
</html>
