<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheme Advisory — Government Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card">
        <div class="card-header"><h3>AI Policy & Scheme Advisory</h3></div>
        <p class="card-desc">Initiate the Policy Advisory AI agent to obtain eligible government scheme recommendations for a registered MSME.</p>
        <div class="form-group">
          <label>MSME Registration ID</label>
          <input type="text" id="msme-id" placeholder="msme-demo-001" />
        </div>
        <button class="btn btn-accent btn-lg" id="run-btn">Initiate Policy Advisory</button>
        <div id="result" style="margin-top:1.5rem"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Government Schemes Catalogue</h3></div>
        <div id="catalog"><div class="loading-pulse"></div></div>
      </div>
    </main>
  </div>
  <script src="/app/js/terminology.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (user.organization_type !== 'government') redirectByRole(user);
    FHS.mountLayout('govt', 'schemes');

    document.getElementById('page-header').innerHTML = FHS.renderPageHeader({
      title: 'Government Scheme Advisory',
      subtitle: 'AI-powered policy analysis & scheme eligibility recommendations',
    });

    const params = new URLSearchParams(location.search);
    if (params.get('msme')) document.getElementById('msme-id').value = params.get('msme');

    api('/api/v1/govt/schemes/catalog').then(d => {
      document.getElementById('catalog').innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:.5rem">
          ${d.schemes.map(s => `<span class="badge badge-low" style="font-size:.8rem;padding:.4rem .75rem">${s}</span>`).join('')}
        </div>`;
    });

    document.getElementById('run-btn').addEventListener('click', async () => {
      const msmeId = document.getElementById('msme-id').value.trim();
      if (!msmeId) return alert('Enter MSME Registration ID');
      const el = document.getElementById('result');
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      el.innerHTML = '<div class="alert alert-info">Initiating Policy Advisory Agent…</div>';
      try {
        const agent = await api(`/api/v1/govt/schemes/recommend/${msmeId}`, { method: 'POST' });
        el.innerHTML = `
          <div class="alert alert-success"><strong>${agent.agent_type}</strong> · ${agent.confidence} confidence${agent.used_llm ? ' · LLM enhanced' : ''}</div>
          <p style="margin:1rem 0;color:var(--text)">${agent.summary}</p>
          <h4 style="font-size:.9rem;color:var(--primary);margin-bottom:.5rem">Eligible Scheme Recommendations</h4>
          <ul style="padding-left:1.25rem;color:var(--muted)">${agent.recommendations.map(r => `<li style="margin-bottom:.35rem">${r}</li>`).join('')}</ul>`;
      } catch (e) {
        el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
