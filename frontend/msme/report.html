<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credit Assessment Report — Enterprise Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card" id="summary"><div class="loading-pulse" style="height:140px"></div></div>
      <iframe class="report-frame" id="report-frame" title="Detailed Report"></iframe>
    </main>
  </div>
  <script src="/app/js/terminology.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (!isMsmeUser(user)) redirectByRole(user);
    FHS.mountLayout('msme', 'dashboard');

    document.getElementById('page-header').innerHTML = `
      <header class="page-header">
        <div class="page-header-text">
          <p class="page-eyebrow">Credit Assessment Report</p>
          <h1 class="page-title">Financial Health Score Report</h1>
        </div>
        <button class="btn btn-outline" onclick="window.print()">Export / Print PDF</button>
      </header>`;

    async function load() {
      let id = new URLSearchParams(location.search).get('id');
      if (!id) {
        const list = await api('/api/v1/msme/assessments');
        if (list.length) id = list[0].assessment_id;
      }
      if (!id) {
        document.getElementById('summary').innerHTML = `
          <div class="empty-state">
            <p>No credit assessment on record.</p>
            <a class="btn btn-accent" href="/app/msme/assess.html" style="margin-top:1rem">Initiate Credit Assessment</a>
          </div>`;
        return;
      }

      const report = await api(`/api/v1/reports/${id}`);
      const frameUrl = await fetchHtmlReport(id);
      document.getElementById('report-frame').src = frameUrl;

      const improvements = (report.recommended_improvements || []).slice(0, 5);
      document.getElementById('summary').innerHTML = `
        ${FHS.renderScoreHero({
          score: report.overall_score,
          grade: report.grade,
          riskLevel: report.overall_risk_level,
          title: report.business_name,
          subtitle: report.executive_summary,
        })}
        ${improvements.length ? `
          <h3 style="margin-top:1.5rem;font-size:.95rem;color:var(--primary)">Recommended Credit Improvement Actions</h3>
          <ul style="margin-top:.75rem;padding-left:1.25rem;color:var(--muted)">${improvements.map(i => `<li style="margin-bottom:.35rem">${i}</li>`).join('')}</ul>
        ` : ''}`;
    }
    load().catch(e => { document.getElementById('summary').innerHTML = `<div class="alert alert-error">${e.message}</div>`; });
  </script>
</body>
</html>
