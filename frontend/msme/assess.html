<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credit Assessment — Enterprise Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card">
        <div class="card-header"><h3>Credit Assessment</h3></div>
        <p class="card-desc">Initiate a 20-dimension Financial Health Score assessment with Carbon Intelligence enrichment and AI-assisted credit analytics.</p>
        <button class="btn btn-accent btn-lg" id="quick-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Initiate Credit Assessment
        </button>
        <div id="result" style="margin-top:1.5rem"></div>
      </div>
      <div class="card" id="loan-card">
        <div class="card-header"><h3>Credit Facility Application</h3></div>
        <p class="card-desc">Submit a credit facility application to IDBI Bank upon completion of your credit assessment.</p>
        <form id="loan-form">
          <div class="form-group">
            <label>Facility Type</label>
            <select id="loan-type">
              <option value="working_capital">Working Capital Facility</option>
              <option value="term_loan">Term Loan</option>
              <option value="equipment_finance">Equipment Finance</option>
              <option value="green_finance">Green / ESG-Linked Finance</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sanction Amount (INR)</label>
            <input type="number" id="amount" min="100000" step="50000" value="2500000" required />
          </div>
          <div class="form-group">
            <label>Repayment Tenure (months)</label>
            <input type="number" id="tenure" min="6" max="120" value="36" required />
          </div>
          <div class="form-group">
            <label>Facility Purpose</label>
            <textarea id="purpose" rows="3" placeholder="Describe the intended use of credit facility…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit Credit Application to IDBI Bank</button>
        </form>
        <div id="loan-msg" style="margin-top:1rem"></div>
      </div>
    </main>
  </div>
  <script src="/app/js/terminology.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (!isMsmeUser(user)) redirectByRole(user);
    FHS.mountLayout('msme', 'assess');

    document.getElementById('page-header').innerHTML = FHS.renderPageHeader({
      title: 'Credit Assessment',
      subtitle: 'Generate your Financial Health Score with AI-assisted credit analytics',
    });

    if (user.role === 'msme_viewer') {
      document.getElementById('quick-btn').disabled = true;
      document.getElementById('loan-card').style.display = 'none';
    }

    let lastAssessmentId = null;

    document.getElementById('quick-btn').addEventListener('click', async () => {
      const el = document.getElementById('result');
      const btn = document.getElementById('quick-btn');
      btn.disabled = true;
      el.innerHTML = '<div class="alert alert-info">Initiating 20-dimension credit assessment with AI orchestration…</div>';
      try {
        const r = await api('/api/v1/msme/assess/quick', { method: 'POST' });
        lastAssessmentId = r.assessment_id;
        el.innerHTML = `
          ${FHS.renderScoreHero({
            score: r.overall_score,
            grade: r.grade,
            riskLevel: r.overall_risk_level,
            title: 'Credit Assessment Complete',
            subtitle: 'Multi-phase AI orchestration across enrichment, dimensional analysis, risk synthesis & reporting',
            ctaHtml: `<a class="btn btn-primary" href="/app/msme/report.html?id=${r.assessment_id}">View Credit Assessment Report</a>`,
          })}
          <div class="alert alert-success" style="margin-top:1rem">Assessment Reference: <code>${r.assessment_id}</code></div>`;
      } catch (e) {
        el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
      btn.disabled = false;
    });

    document.getElementById('loan-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        const res = await api('/api/v1/msme/loans', {
          method: 'POST',
          body: JSON.stringify({
            loan_type: document.getElementById('loan-type').value,
            amount_inr: Number(document.getElementById('amount').value),
            tenure_months: Number(document.getElementById('tenure').value),
            purpose: document.getElementById('purpose').value,
            assessment_id: lastAssessmentId,
          }),
        });
        document.getElementById('loan-msg').innerHTML = `<div class="alert alert-success">Credit application <strong>${res.application_ref}</strong> submitted successfully.</div>`;
      } catch (err) {
        document.getElementById('loan-msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
