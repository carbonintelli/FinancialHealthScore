<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detailed Report — Financial Health Score</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card" id="summary"><div class="loading-pulse" style="height:140px"></div></div>
      <iframe class="report-frame" id="report-frame" title="Detailed Report"></iframe>
    </main>
  </div>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (!isBankUser(user)) redirectByRole(user);
    FHS.mountLayout('bank', 'dashboard');

    const params = new URLSearchParams(location.search);
    let assessmentId = params.get('id');

    document.getElementById('page-header').innerHTML = `
      <header class="page-header">
        <div class="page-header-text">
          <p class="page-eyebrow">Credit Assessment Report</p>
          <h1 class="page-title">Detailed Credit Report</h1>
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn btn-outline" onclick="window.print()">Print</button>
          <a class="btn btn-primary" id="html-link" target="_blank">Open Full HTML</a>
        </div>
      </header>`;

    async function load() {
      if (!assessmentId && params.get('msme')) {
        const list = await api('/api/v1/bank/assessments');
        const match = list.find(a => a.msme_id === params.get('msme'));
        if (match) assessmentId = match.assessment_id;
      }
      if (!assessmentId) {
        document.getElementById('summary').innerHTML = '<div class="empty-state"><p>No assessment selected.</p></div>';
        return;
      }

      const report = await api(`/api/v1/reports/${assessmentId}`);
      document.getElementById('html-link').href = `/api/v1/reports/${assessmentId}/html`;
      document.getElementById('report-frame').src = `/api/v1/reports/${assessmentId}/html`;

      document.getElementById('summary').innerHTML = `
        ${FHS.renderScoreHero({
          score: report.overall_score,
          grade: report.grade,
          riskLevel: report.overall_risk_level,
          title: report.business_name,
          subtitle: report.executive_summary,
        })}
        <div class="alert alert-success" style="margin-top:1.25rem">
          <strong>Credit Decision:</strong> ${report.credit_decision_recommendation}
        </div>`;
    }
    load().catch(e => { document.getElementById('summary').innerHTML = `<div class="alert alert-error">${e.message}</div>`; });
  </script>
</body>
</html>
