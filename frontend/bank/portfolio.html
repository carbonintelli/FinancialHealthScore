<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSME Lending Portfolio — Lending Institution Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card" id="portfolio"><div class="loading-pulse"></div></div>
    </main>
  </div>
  <script src="/app/js/terminology.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (!isBankUser(user)) redirectByRole(user);
    FHS.mountLayout('bank', 'portfolio');

    document.getElementById('page-header').innerHTML = FHS.renderPageHeader({
      title: 'MSME Lending Portfolio',
      subtitle: 'Assess creditworthiness and manage borrower relationships across your lending book',
    });

    async function assess(msmeId, name) {
      if (!confirm(`Initiate credit assessment for ${name}?`)) return;
      try {
        const result = await api(`/api/v1/bank/assess/${msmeId}`, { method: 'POST' });
        window.location.href = `/app/bank/report.html?id=${result.assessment_id}`;
      } catch (e) { alert(e.message); }
    }

    api('/api/v1/bank/portfolio').then(items => {
      document.getElementById('portfolio').innerHTML = `
        <div class="table-wrap"><table>
          <thead><tr><th>Enterprise</th><th>Sector</th><th>FHS</th><th>Credit Grade</th><th>Risk Rating</th><th>Sanctioned Limit</th><th>RM</th><th></th></tr></thead>
          <tbody>${items.map(p => `
            <tr>
              <td><strong>${p.business_name}</strong><br><small style="color:var(--muted)">${p.msme_id}</small></td>
              <td>${p.sector}</td>
              <td>${p.latest_score != null ? `<span class="score-cell">${p.latest_score.toFixed(1)}</span>` : '—'}</td>
              <td>${p.latest_grade ? `<span class="${FHS.gradeClass(p.latest_grade)}">${p.latest_grade}</span>` : '—'}</td>
              <td>${riskBadge(p.latest_risk_level)}</td>
              <td>${formatInr(p.credit_limit_inr)}</td>
              <td>${p.relationship_manager || '—'}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-sm btn-accent" onclick="assess('${p.msme_id}','${p.business_name.replace(/'/g, "\\'")}')">Initiate Assessment</button>
                ${p.latest_score != null ? `<a class="btn btn-sm btn-outline" href="/app/bank/report.html?msme=${p.msme_id}">Credit Report</a>` : ''}
              </td>
            </tr>
          `).join('')}</tbody>
        </table></div>`;
    }).catch(e => alert(e.message));
  </script>
</body>
</html>
