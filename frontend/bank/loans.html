<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Applications — Financial Health Score</title>
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" style="display:flex;flex-direction:column;min-height:100vh">
      <div class="brand">Financial Health Score</div>
      <nav>
        <a href="/app/bank/dashboard.html">Dashboard</a>
        <a href="/app/bank/portfolio.html">Portfolio</a>
        <a href="/app/bank/loans.html" class="active">Loan Applications</a>
      </nav>
      <div class="user-block"><button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="logout()">Sign Out</button></div>
    </aside>
    <main class="main">
      <h1 class="page-title">Loan Applications</h1>
      <div class="card" id="loans">Loading…</div>
    </main>
  </div>
  <script src="/app/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (!isBankUser(user)) redirectByRole(user);

    async function updateStatus(id, status) {
      const notes = prompt('Reviewer notes (optional):') || '';
      try {
        await api(`/api/v1/bank/loans/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status, reviewer_notes: notes }),
        });
        location.reload();
      } catch (e) { alert(e.message); }
    }

    api('/api/v1/bank/loans').then(loans => {
      if (!loans.length) {
        document.getElementById('loans').innerHTML = '<p style="color:var(--muted)">No loan applications yet.</p>';
        return;
      }
      document.getElementById('loans').innerHTML = `
        <table>
          <thead><tr><th>Ref</th><th>Business</th><th>Type</th><th>Amount</th><th>Tenure</th><th>Status</th><th>Date</th><th></th></tr></thead>
          <tbody>${loans.map(l => `
            <tr>
              <td>${l.application_ref}</td>
              <td>${l.business_name}</td>
              <td>${l.loan_type}</td>
              <td>${formatInr(l.amount_inr)}</td>
              <td>${l.tenure_months} mo</td>
              <td><span class="badge">${l.status}</span></td>
              <td>${formatDate(l.created_at)}</td>
              <td>
                ${l.status === 'submitted' ? `<button class="btn btn-sm btn-accent" onclick="updateStatus(${l.id},'under_review')">Review</button>` : ''}
                ${['submitted','under_review'].includes(l.status) ? `
                  <button class="btn btn-sm btn-primary" onclick="updateStatus(${l.id},'approved')">Approve</button>
                  <button class="btn btn-sm btn-outline" onclick="updateStatus(${l.id},'rejected')">Reject</button>
                ` : ''}
              </td>
            </tr>
          `).join('')}</tbody>
        </table>`;
    }).catch(e => alert(e.message));
  </script>
</body>
</html>
