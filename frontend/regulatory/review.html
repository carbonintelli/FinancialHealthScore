<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance Review — Regulatory Portal</title>
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div id="page-header"></div>
      <div class="card">
        <div class="card-header"><h3>AI Regulatory Compliance Review</h3></div>
        <p class="card-desc">Run the Regulatory Compliance agent to review MSME assessments for RBI, GSTN, or MCA supervision.</p>
        <div class="form-group">
          <label>MSME ID</label>
          <input type="text" id="msme-id" placeholder="msme-demo-001" />
        </div>
        <button class="btn btn-primary btn-lg" id="review-btn">Run Compliance Agent</button>
        <div id="result" style="margin-top:1.5rem"></div>
      </div>
    </main>
  </div>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/ui.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const user = getUser();
    if (user.organization_type !== 'regulatory') redirectByRole(user);
    FHS.mountLayout('regulatory', 'review');

    document.getElementById('page-header').innerHTML = FHS.renderPageHeader({
      title: 'Compliance Review',
      subtitle: 'AI-assisted regulatory supervision and compliance flagging',
    });

    const params = new URLSearchParams(location.search);
    if (params.get('msme')) document.getElementById('msme-id').value = params.get('msme');

    document.getElementById('review-btn').addEventListener('click', async () => {
      const msmeId = document.getElementById('msme-id').value.trim();
      if (!msmeId) return alert('Enter MSME ID');
      const el = document.getElementById('result');
      const btn = document.getElementById('review-btn');
      btn.disabled = true;
      el.innerHTML = '<div class="alert alert-info">Running Regulatory Compliance Agent…</div>';
      try {
        const res = await api(`/api/v1/regulatory/review/${msmeId}`, { method: 'POST' });
        const agent = res.agent_review;
        el.innerHTML = `
          <div class="alert alert-success">Submission <strong>${res.submission_ref}</strong> recorded</div>
          <p style="margin:1rem 0"><strong>${agent.agent_type}</strong> — ${agent.summary}</p>
          <h4 style="font-size:.9rem;color:var(--primary)">Recommendations</h4>
          <ul style="margin:.5rem 0 1rem;padding-left:1.25rem;color:var(--muted)">${agent.recommendations.map(r => `<li style="margin-bottom:.35rem">${r}</li>`).join('')}</ul>
          <pre style="background:#f8fafc;padding:1rem;border-radius:var(--radius-sm);font-size:.82rem;border:1px solid var(--border);overflow:auto">${JSON.stringify(agent.structured_output, null, 2)}</pre>`;
      } catch (e) {
        el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
