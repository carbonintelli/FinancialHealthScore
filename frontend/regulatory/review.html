<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Compliance Review — Regulatory Portal</title>
  <link rel="stylesheet" href="/app/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" style="display:flex;flex-direction:column;min-height:100vh;background:linear-gradient(180deg,#5c2d0e,#3d1a0a)">
      <div class="brand">Regulatory Intelligence</div>
      <nav>
        <a href="/app/regulatory/dashboard.html">Dashboard</a>
        <a href="/app/regulatory/review.html" class="active">Compliance Review</a>
      </nav>
      <div class="user-block"><button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="logout()">Sign Out</button></div>
    </aside>
    <main class="main">
      <h1 class="page-title">AI Regulatory Compliance Review</h1>
      <div class="card">
        <div class="form-group">
          <label>MSME ID</label>
          <input type="text" id="msme-id" placeholder="msme-demo-001" />
        </div>
        <button class="btn btn-primary" id="review-btn">Run Regulatory Compliance Agent</button>
        <div id="result" style="margin-top:1.5rem"></div>
      </div>
    </main>
  </div>
  <script src="/app/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const params = new URLSearchParams(location.search);
    if (params.get('msme')) document.getElementById('msme-id').value = params.get('msme');

    document.getElementById('review-btn').addEventListener('click', async () => {
      const msmeId = document.getElementById('msme-id').value.trim();
      if (!msmeId) return alert('Enter MSME ID');
      const el = document.getElementById('result');
      el.innerHTML = '<p>Running Regulatory Compliance Agent…</p>';
      try {
        const res = await api(`/api/v1/regulatory/review/${msmeId}`, { method: 'POST' });
        const agent = res.agent_review;
        el.innerHTML = `
          <div class="alert alert-success">Submission ${res.submission_ref} recorded</div>
          <p><strong>${agent.agent_type}</strong> — ${agent.summary}</p>
          <h4>Recommendations</h4>
          <ul>${agent.recommendations.map(r => `<li>${r}</li>`).join('')}</ul>
          <pre style="background:#f4f7fa;padding:1rem;border-radius:8px;font-size:.85rem;margin-top:1rem">${JSON.stringify(agent.structured_output, null, 2)}</pre>`;
      } catch (e) { el.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
    });
  </script>
</body>
</html>
